# Nixpacks build config for Coolify (default build pack — used unless you switch
# the resource to the Dockerfile build pack).
#
# Nixpacks does NOT install Chromium's system libraries by default, so
# @remotion/renderer can't launch headless Chrome. The aptPkgs below add exactly
# the runtime libs + fonts Remotion needs.
#
# IMPORTANT: the libs alone aren't enough. The Coolify BUILD command must also
# bake in the browser + the Remotion bundle, e.g.:
#
#   bun install && bun run build && bunx remotion browser ensure && bun run bundle:remotion
#
# (`remotion browser ensure` downloads the Chrome Headless Shell; `bundle:remotion`
# pre-builds .remotion-bundle/ so the serveUrl is ready at boot.)
# Start command (Coolify UI): bun run start

[phases.setup]
aptPkgs = [
  "ca-certificates","fonts-liberation","libasound2","libatk-bridge2.0-0",
  "libatk1.0-0","libcups2","libdbus-1-3","libdrm2","libgbm1","libgtk-3-0",
  "libnss3","libpango-1.0-0","libxcomposite1","libxdamage1","libxfixes3",
  "libxkbcommon0","libxrandr2"
]
